<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stage 3：幻霧濾鏡</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Stage 3：幻霧濾鏡</h1>
      <p>觀看「大菸草帝國」不實宣傳 30 秒，隨後啟動 3 題終極破譯選擇題任務。</p>
    </header>

    <section class="card" id="promoCard" aria-label="不實宣傳影片">
      <div class="promo" role="group" aria-roledescription="宣傳影像">
        <div class="fog" aria-hidden="true"></div>
        <div class="badge">水果味？無害？</div>
        <div class="timer" id="timer">00:30</div>
        <div class="slogan">
          <h2>莓果清新，無負擔的享受</h2>
          <p>「天然水果香，就像咬一口夏天。」</p>
          <button class="cta" disabled>觀看中…</button>
          <div class="divider"></div>
          <p style="margin-top:10px; font-size:12px; color:#bde9ff;">
            內容純屬廣告包裝，請保持思辨。
          </p>
        </div>
      </div>
      <div class="status" id="promoStatus">請完整觀看 30 秒，系統將自動送出破譯任務。</div>
    </section>

    <section class="card quiz" id="quizCard" aria-label="破譯選擇題">
      <div class="q" id="qBox">
        <img src="" id="qImage" class="q-img" alt="題目提示情境圖" />
        <h3 id="qText">題目載入中…</h3>
        <div class="choices" id="choices"></div>
        
        <div class="status">
          <div>進度提示：<span id="progressPill" class="pill">1 / 3</span></div>
          <div>狀態：<span class="pill" style="color:var(--warn)">作答中（需全對才能通關）</span></div>
        </div>
      </div>

      <div class="result" id="resultBox">
        <h2 id="resultTitle">結算中…</h2>
        <div class="score-display" id="scoreDisplay">0 / 3</div>
        <p id="resultMsg">正在計算你的破譯成功率...</p>
        
        <div class="report-title">💡 破譯報告明細</div>
        <div class="report-list" id="reportList"></div>

        <button class="btn" id="retryBtn" style="display:none;">重新挑戰</button>
        <button class="btn primary" id="nextBtn" style="display:none;">前往下一關</button>
      </div>
    </section>

    <footer>
      教育用途示範。請遵循在地菸害防制相關法規。<span class="legal">未成年請勿吸菸／電子煙也含成癮風險</span>
      <div style="margin-top: 15px; opacity: 0.7; font-size: 11px;">© 2026 Designed & Developed by Nokia</div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
